name: Dernek ERP CI/CD Pipeline

# İş Akışının Ne Zaman Çalışacağını Tanımla
on:
  push:
    # main ve develop branch'lerine yapılan her push'ta çalıştır
    branches: [ main, develop ]
  pull_request:
    # main ve develop'a gelen her Pull Request'te (PR) çalıştır
    branches: [ main, develop ]

jobs:
  # ====================================================================
  # AŞAMA 1: KOD KALİTESİ KONTROLÜ (CODE QUALITY)
  # ====================================================================
  code-quality:
    runs-on: ubuntu-latest
    steps:
    - name: Kodu Klonla
      uses: actions/checkout@v4

    - name: Python 3.11 Ortamını Kur
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip' 
        
    - name: Bağımlılıkları Kur
      run: pip install -r requirements.txt
  # ====================================================================
  # AŞAMA 2: DOCKER İMAJINI OLUŞTUR, GHCR'YE GÖNDER VE RENDER'I TETİKLE
  # ====================================================================
  build-and-push-docker:
    # Yalnızca code-quality aşaması BAŞARIYLA tamamlanırsa çalışır.
    needs: code-quality 
    runs-on: ubuntu-latest
    
    # GHCR'ye yazma izni CRİTİKTİR!
    permissions:
      contents: read
      packages: write
      
    steps:
      - name: Kodu Klonla
        uses: actions/checkout@v4

      - name: Docker'a Giriş Yap (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }} 
          password: ${{ secrets.GITHUB_TOKEN }} 

      - name: Metadata (Etiket) Oluşturma
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }} 

      - name: Docker İmajını Oluştur ve GHCR'ye Gönder
        uses: docker/build-push-action@v5
        with:
          context: . 
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          
      - name: RENDER Dağıtımını Tetikle (Sürekli Dağıtım)
        # Bu, imaj GHCR'ye gittikten sonra Render'a sinyal gönderir.
        # Bu adımın çalışması için RENDER_DEPLOY_HOOK_URL sırrının GitHub'a eklenmiş olması gerekir.
        run: |
          echo "Render Dağıtımını Tetikliyor..."
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}